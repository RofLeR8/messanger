name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  POSTGRES_USER: ws-test
  POSTGRES_PASSWORD: ws-test
  POSTGRES_DB: ws-test
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  SECRET_KEY: test-secret-key
  ALGORITHM: HS256

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.0

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run linter
        run: |
          pip install ruff
          ruff check src/

      - name: Run tests
        run: poetry run pytest tests/ -v

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for production
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > src/.env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> src/.env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> src/.env
          echo "POSTGRES_HOST=db" >> src/.env
          echo "POSTGRES_PORT=5432" >> src/.env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> src/.env
          echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> src/.env

      - name: Deploy with Docker Compose
        run: |
          docker compose pull
          docker compose up -d --build
        env:
          DOCKER_BUILDKIT: 1
