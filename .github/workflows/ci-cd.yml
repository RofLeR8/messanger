name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  POSTGRES_USER: ws-test
  POSTGRES_PASSWORD: ws-test
  POSTGRES_DB: ws-test
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  SECRET_KEY: test-secret-key
  ALGORITHM: HS256

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.3.3

      - name: Install dependencies
        run: poetry install --no-interaction --no-root --only main

      - name: Run linter
        run: |
          poetry run pip install ruff
          poetry run ruff check src/

  deploy:
    needs: lint-and-test
    runs-on: self-hosted
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/messanger

          # Generate .env from secrets
          cat > src/.env << EOF
          SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
          ALGORITHM=HS256
          POSTGRES_USER=${{ secrets.DB_USER }}
          POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
          POSTGRES_DB=${{ secrets.DB_NAME }}
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@db:5432/${{ secrets.DB_NAME }}
          EOF

          git pull origin main
          docker compose up -d --build --remove-orphans
          docker image prune -f
          echo "Deploy completed at $(date)"
