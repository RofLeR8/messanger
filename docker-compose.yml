services:
  db:
    image: postgres:16-alpine
    container_name: back_messanger_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ws-test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ws-test}
      POSTGRES_DB: ${POSTGRES_DB:-ws-test}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ws-test} -d ${POSTGRES_DB:-ws-test}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: back_messanger_app
    env_file:
      - src/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
